  .logo-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .chip-med { border-color: var(--medium); color: var(--medium); }

  .tag-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(124,111,247,0.1); color: var(--accent); border: 1px solid rgba(124,111,247,0.2); font-family: 'DM Mono', monospace; }
  .toggle-icon { font-size: 16px; color: var(--muted); align-self: center; }

  .qa-a.open { display: block; }
  .answer-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .answer-text { font-size: 14px; color: #c8c8d8; line-height: 1.75; }
  .answer-text strong { color: var(--text); font-weight: 600; }
  .answer-text code { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--accent2); }

  .answer-text .code-block { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent2); margin: 10px 0; white-space: pre-wrap; line-height: 1.6; }

  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  .progress { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
</style>

<strong>O(n²) naive approach:</strong> Nested loops — check every pair.<br><br>
<strong>O(n) optimal approach:</strong> Use a hash map to store numbers we've seen and their indices:<br>
<div class="code-block">def two_sum(nums, target):
    seen = {}  # value → index
    for i, num in enumerate(nums):
        complement = target - num
        if complement in seen:
            return [seen[complement], i]
        seen[num] = i
    return []

# → num=7, complement=2 (found in seen at index 0!)
# → return [0, 1]  ✅</div>

<div class="code-block">def length_of_longest_substring(s: str) -> int:
    char_index = {}  # char → last seen index
    left = 0
    max_len = 0

    for right, char in enumerate(s):
        # If char was seen and is inside our current window
        if char in char_index and char_index[char] >= left:
            left = char_index[char] + 1  # shrink window
        char_index[char] = right
        max_len = max(max_len, right - left + 1)

    return max_len

# "abcabcbb" → 3 ("abc")
# "pwwkew"   → 3 ("wke")</div>

<div class="code-block">from collections import deque, defaultdict

def task_order(n, dependencies):
    # Build adjacency list + in-degree count
    graph = defaultdict(list)
    in_degree = [0] * n

    for a, b in dependencies:  # b must be done before a
        graph[b].append(a)
        in_degree[a] += 1

    # Start with tasks that have no dependencies
    queue = deque([i for i in range(n) if in_degree[i] == 0])
    order = []

    while queue:
        task = queue.popleft()
        order.append(task)
        for dependent in graph[task]:
            in_degree[dependent] -= 1
            if in_degree[dependent] == 0:
                queue.append(dependent)

    return order if len(order) == n else []  # empty = cycle detected

# 4 tasks, task 1 needs 0, task 2 needs 1, task 3 needs 0
task_order(4, [[1,0],[2,1],[3,0]])  # → [0, 1, 3, 2]</div>

let activeLevel = "all";
let openCards = new Set();
let openSections = {};
data.forEach(s => openSections[s.id] = true);

function getFiltered() {
  const search = document.getElementById("search")?.value.toLowerCase() || "";
  return data.map(sec => {
    const qs = sec.qs.filter(q => {
      const lvlOk = activeLevel === "all" || q.level === activeLevel;
      const srchOk = !search || q.q.toLowerCase().includes(search) || (q.a||"").toLowerCase().includes(search);
      return lvlOk && srchOk;
    });
    return { ...sec, qs };
  }).filter(s => s.qs.length > 0);
}

function render() {
  const filtered = getFiltered();
  const total = filtered.reduce((a,s)=>a+s.qs.length,0);
  const easy = filtered.reduce((a,s)=>a+s.qs.filter(q=>q.level==="easy").length,0);
  const med = filtered.reduce((a,s)=>a+s.qs.filter(q=>q.level==="medium").length,0);
  const hard = filtered.reduce((a,s)=>a+s.qs.filter(q=>q.level==="hard").length,0);

  document.getElementById("chip-total").textContent = total + " questions";
  document.getElementById("chip-easy").textContent = easy + " basic";
  document.getElementById("chip-med").textContent = med + " medium";
  document.getElementById("chip-hard").textContent = hard + " hard";

  // Filters
  document.getElementById("filters").innerHTML = [
    {v:"all",l:"All Levels"},
    {v:"easy",l:"Basic",cls:"on-easy"},
    {v:"medium",l:"Medium",cls:"on-med"},
    {v:"hard",l:"Hard",cls:"on-hard"}
  ].map(f => `<button class="filter-btn ${activeLevel===f.v?(f.cls||'on'):''}" onclick="setLevel('${f.v}')">${f.l}</button>`).join("");

  // Sidebar
  document.getElementById("sidebar-nav").innerHTML = filtered.map(s => `
    <button class="nav-item" onclick="scrollTo('${s.id}')">
      <span class="nav-dot" style="background:${s.color}"></span>${s.name}
    </button>`).join("");

  // Content
  if(!filtered.length) {
    document.getElementById("content").innerHTML = `<div class="empty">No questions match your search.</div>`;
    return;
  }

  document.getElementById("content").innerHTML = filtered.map(sec => {
    const isOpen = openSections[sec.id] !== false;
    const completed = [...openCards].filter(k=>k.startsWith(sec.id+"-")).length;
    const pct = sec.qs.length ? Math.round(completed/sec.qs.length*100) : 0;
    return `
    <div class="section" id="sec-${sec.id}">
      <div class="section-head" onclick="toggleSection('${sec.id}')">
        <div class="section-icon" style="background:${sec.color}22;color:${sec.color};font-family:monospace;font-size:12px;font-weight:600">${sec.icon}</div>
        <span class="section-name">${sec.name}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="section-count">${sec.qs.length} Q</span>
        </div>
        <span class="chevron ${isOpen?'open':''}">▼</span>
      </div>
      ${isOpen ? sec.qs.map((q, j) => {
        const key = `${sec.id}-${j}`;
        const isCardOpen = openCards.has(key);
        return `
        <div class="qa-card">
          <div class="qa-q" onclick="toggleCard('${key}')">
            <span class="q-num">${j+1}.</span>
            <div class="q-body">
              <div class="q-text">${q.q}</div>
              <div class="q-meta">
                <span class="level-badge lv-${q.level}">${q.level}</span>
                ${q.tags.map(t=>`<span class="tag-badge">${t}</span>`).join("")}
              </div>
            </div>
            <span class="toggle-icon">${isCardOpen?'−':'+'}</span>
          </div>
          <div class="qa-a ${isCardOpen?'open':''}">
            <div class="answer-label">▸ answer</div>
            <div class="answer-text">${q.a}</div>
          </div>
        </div>`;
      }).join("") : ""}
    </div>`;
  }).join("");
}

function setLevel(l) { activeLevel = l; render(); }
function toggleSection(id) { openSections[id] = !openSections[id]; render(); }
function toggleCard(key) {
  if(openCards.has(key)) openCards.delete(key);
  else openCards.add(key);
  render();
}
function scrollTo(id) {
  const el = document.getElementById("sec-"+id);
  if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
}

render();
</script>
